description: Virtual Channel controller — owns the ordered channel list

compatible: "jianwei,vc-controller"

include: base.yaml

properties:
  channels:
    type: phandles
    required: true
    description: |
      Ordered list of VC channel device phandles. The order defines
      the channel index domain-side.
