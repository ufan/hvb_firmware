description: LVB Virtual Voltage Channel (child of vc-controller)

compatible: "jianwei,lvb-vc-channel"

properties:
  reg:
    type: array
    required: true
    description: Channel index (0-based).
  label:
    type: string
    required: true
    description: Human-readable channel name.
  capabilities:
    type: int
    required: true
    description: Bitmask of CH_CAP_* flags.
  enable-gpios:
    type: phandle-array
    required: true
    description: GPIO that enables channel output (active-high).
  io-channels:
    type: phandle-array
    required: true
    description: ADC channel references; must match io-channel-names order.
  io-channel-names:
    type: string-array
    required: true
    description: Must contain "voltage" and "current" (in that order).
  calib-current-b:
    type: int
    required: false
    default: 0
    description: >
      Initial value for measured_current_calib_b (int16_t). Represents the
      ADC reading at zero current (negated: if zero-current raw = 1822,
      set -1822). Loaded as the channel's default measured_current_calib_b
      at first boot; can be refined via the calibration workflow.
  sample-rate-ms:
    type: int
    required: false
    description: >
      Per-sample timer interval in ms. Overrides
      CONFIG_LVB_VC_DEFAULT_SAMPLE_RATE_MS for this specific channel.
  oversample-count:
    type: int
    required: false
    description: >
      Number of ADC samples averaged before one measurement is reported.
      Overrides CONFIG_LVB_VC_OVERSAMPLE_COUNT for this specific channel.
  default-output-disabled:
    type: boolean
    description: >
      Set to start this channel's configured_output_enabled factory
      default as false instead of the normal CONFIG_VC_DEFAULT_OUTPUT_ENABLED
      value. Absent (the common case) means this channel follows the global
      Kconfig default like every other channel — this property only exists
      to mark the exceptions. Only meaningful on channels with
      CH_CAP_OUTPUT_ENABLE (switchable channels); silently has no effect on
      a locked always-on channel, since configured_output_enabled isn't a
      supported register there regardless of its stored value.
