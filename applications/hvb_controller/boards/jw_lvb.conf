# LVB board overrides merged with prj.conf at build time.
# Enable LVB driver; disable HVB-specific peripherals not present on this board.

CONFIG_LVB_VC_CHANNEL=y
CONFIG_ADC=y
CONFIG_ADC_STM32=y

CONFIG_VC_VARIANT_ID=2

# Voltage calibration: 3.3 V ref, 5.6 kΩ / 1 kΩ divider → k = 10000 * 3300 * 6.6 / 4096 / 1000
# Simplified: k = (3300 * 6600) / (4096 * 100) ≈ 5310 — tune per board calibration
# Leave at Kconfig default (10000) and calibrate via shell/Modbus
CONFIG_VC_DEFAULT_MEASURED_V_CAL_K=10000

# Disable HVB-specific drivers and peripherals
CONFIG_HVB_VC_CHANNEL=n
CONFIG_AD5541=n
CONFIG_ADS1232=n
CONFIG_DAC=n
CONFIG_SPI=n

# No SHT3x temperature sensor on LVB board
CONFIG_SYS_STATUS=n
CONFIG_SHT3XD=n
CONFIG_I2C=n
CONFIG_SENSOR=n
