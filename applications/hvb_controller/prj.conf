CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_CMDS=y
CONFIG_MODBUS=y
CONFIG_MODBUS_ROLE_SERVER=y
CONFIG_UI_MODBUS_RTU=y

# Suppress protocol-exception INFO logs (e.g. "FC 0x04 Error 0x02" on
# absent channels). Set to 1 for ERROR-only, 2 for WARNING+ERROR.
# Default is 3 (INFO) — useful for development, noise for production.
CONFIG_MODBUS_LOG_LEVEL=2
CONFIG_VC_SHELL=y
CONFIG_MODBUS_ADAPTER_SHELL=y
CONFIG_SYS_STATUS_SHELL=y


CONFIG_ADC=y
CONFIG_DAC=y
CONFIG_SPI=y
CONFIG_AD5541=y
CONFIG_ADS1232=y

CONFIG_HVB_VC_CHANNEL=y
CONFIG_VC_CHANNEL_CONTROLLER=y
CONFIG_VC_RUNTIME=y
CONFIG_VC_SETTINGS_PERSISTENCE=y


CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_SHT3XD=y
CONFIG_SYS_STATUS=y
CONFIG_REBOOT=y
CONFIG_SYS_RESET=y
