# ---- Generic system ----
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_CMDS=y

# ---- Modbus RTU frontend ----
CONFIG_MODBUS=y
CONFIG_MODBUS_ROLE_SERVER=y
CONFIG_UI_MODBUS_RTU=y

# Suppress protocol-exception INFO logs (e.g. "FC 0x04 Error 0x02" on
# absent channels). Use _ERR for error-only, _WRN for warning+error.
# Default is _INF — useful for development, noise for production.
CONFIG_MODBUS_LOG_LEVEL_WRN=y

# ---- Shell ----
CONFIG_VC_SHELL=y
CONFIG_MODBUS_ADAPTER_SHELL=y
# independent of CONFIG_SYS_STATUS — always shows uptime/fw version,
# plus temp/humidity on boards that also enable CONFIG_SYS_STATUS
CONFIG_SYS_STATUS_SHELL=y

# ---- ADC (both boards have ADCs; exact driver auto-selected via DTS) ----
CONFIG_ADC=y

# ---- Voltage-control framework (channel config from DTS) ----
# Board-specific channel driver (HVB_VC_CHANNEL / LVB_VC_CHANNEL)
# auto-enables via DT_HAS_*_ENABLED gated by Kconfig.defconfig.
CONFIG_VC_CHANNEL_CONTROLLER=y
CONFIG_VC_RUNTIME=y
CONFIG_VC_SETTINGS_PERSISTENCE=y

# ---- System reset ----
CONFIG_REBOOT=y
CONFIG_SYS_RESET=y
